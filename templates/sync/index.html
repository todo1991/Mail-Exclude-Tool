{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-lg border border-slate-200 p-6">
  <div class="flex items-start justify-between mb-6">
    <div>
      <h2 class="text-xl font-semibold mb-1">Sync from Listmonk</h2>
      <p class="text-sm text-slate-500">
        Listmonk lists are pulled and cached locally for fast filtering.
        Subscriber CRUD (add/remove) is done directly in Listmonk's UI.
      </p>
    </div>
    <button type="button"
            hx-post="{{ url_for('sync_refresh_index') }}"
            hx-target="#sync-panel"
            hx-swap="outerHTML"
            class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium">
      🔄 Refresh list index
    </button>
  </div>

  {% include "sync/_panel.html" %}
</div>
{% endblock %}
