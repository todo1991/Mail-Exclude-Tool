{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-12 gap-6">
  <aside class="col-span-3">
    <div class="bg-white rounded-lg border border-slate-200 p-4 sticky top-6">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Progress</h2>
      <ol id="wizard-steps" class="space-y-2 text-sm">
        <li data-step="1" class="flex items-center gap-3 px-3 py-2 rounded-md bg-indigo-50 text-indigo-700 font-medium">
          <span class="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs">1</span>
          Source list
        </li>
        <li data-step="2" class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500">
          <span class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs">2</span>
          Region
        </li>
        <li data-step="3" class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500">
          <span class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs">3</span>
          Email Exclude
        </li>
        <li data-step="4" class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500">
          <span class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs">4</span>
          Domain Exclude
        </li>
        <li data-step="5" class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500">
          <span class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs">5</span>
          Result
        </li>
      </ol>
    </div>
  </aside>

  <section class="col-span-9">
    <form id="wizard-form" class="bg-white rounded-lg border border-slate-200 p-8">
      <div id="wizard-body">
        {% include "filter/_step1.html" %}
      </div>
    </form>
  </section>
</div>

<script>
  // Highlight current step in sidebar based on data-step attribute on the body content.
  document.body.addEventListener("htmx:afterSwap", (e) => {
    if (e.target.id !== "wizard-body") return;
    const current = parseInt(e.target.firstElementChild?.dataset?.step || "1", 10);
    document.querySelectorAll("#wizard-steps li").forEach((li) => {
      const n = parseInt(li.dataset.step, 10);
      const dot = li.querySelector("span:first-child");
      if (n < current) {
        li.className = "flex items-center gap-3 px-3 py-2 rounded-md text-emerald-700";
        dot.className = "w-6 h-6 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs";
        dot.textContent = "✓";
      } else if (n === current) {
        li.className = "flex items-center gap-3 px-3 py-2 rounded-md bg-indigo-50 text-indigo-700 font-medium";
        dot.className = "w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs";
        dot.textContent = String(n);
      } else {
        li.className = "flex items-center gap-3 px-3 py-2 rounded-md text-slate-500";
        dot.className = "w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs";
        dot.textContent = String(n);
      }
    });
  });
</script>
{% endblock %}
